name: Build

on:
  workflow_call:
    inputs:
      env:
        type: string
        required: true
        description: environment to deploy
      artifact-name:
        type: string
        required: true
        description: Name of the artifact to download

jobs:
  deploy:
    environment: ${{ inputs.env }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build
          path: .

      - name: Deploy
        run: echo 'Deploying'
