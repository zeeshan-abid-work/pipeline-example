name: Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: "Lint"
        run: echo 'Linting'

      - name: Test
        run: echo 'Testing'

      - name: Build
        run: echo 'building'

      - name: Save Artifact
        uses: actions/upload-artifact@v3
        with:
          name: build
          path: .

  dev:
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v3
        with:
          name: build
          path: .

      - name:
        run: echo 'Deploying'

  stage:
    runs-on: ubuntu-latest
    needs: dev
    environment: stage

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v3
        with:
          name: build
          path: .

      - name:
        run: echo 'Deploying'

  prod:
    runs-on: ubuntu-latest
    needs: stage
    environment: prod

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v3
        with:
          name: build
          path: .

      - name:
        run: echo 'Deploying'
